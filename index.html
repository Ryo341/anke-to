<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アニメDJコスプレイベント アンケート</title>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #111a3d;
      --line: #7dd8ff;
      --line-soft: rgba(125, 216, 255, 0.2);
      --text: #eef5ff;
      --muted: #9eb6dc;
      --accent: #2ec9ff;
      --accent-2: #7ef3de;
      --danger: #ff6f8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      font-size: 17px;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, #173173 0%, rgba(23, 49, 115, 0) 40%),
        radial-gradient(circle at 80% 20%, #004d6a 0%, rgba(0, 77, 106, 0) 35%),
        repeating-linear-gradient(
          -18deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 2px,
          transparent 2px,
          transparent 18px
        ),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-image-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 280ms ease;
    }

    .bg-image-layer.is-visible {
      opacity: 0.3;
    }

    .screen {
      position: relative;
      width: min(1100px, 100vw);
      margin: 0 auto;
      padding: 14px 12px 20px;
    }

    .glow-line {
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 12px var(--accent);
      opacity: 0.9;
    }

    .hero {
      position: relative;
      border: 1px solid var(--line-soft);
      border-radius: 22px;
      background: linear-gradient(160deg, rgba(5, 17, 50, 0.75), rgba(8, 24, 56, 0.2));
      padding: 20px 14px 28px;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(126, 243, 222, 0.08), rgba(46, 201, 255, 0.03));
      z-index: -1;
    }

    .hero-head {
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .eyebrow {
      margin: 0;
      letter-spacing: 0.2em;
      font-size: 13px;
      color: var(--accent-2);
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1.15;
      letter-spacing: 0.04em;
      text-shadow: 0 0 24px rgba(46, 201, 255, 0.25);
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .character-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .character-front-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .character-slot {
      position: absolute;
      width: var(--w, 220px);
      left: var(--x, auto);
      right: var(--r, auto);
      top: var(--t, auto);
      bottom: var(--y, -10px);
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.35));
      transform: var(--start-transform, translateY(12px));
      animation: fade-in-up 800ms ease forwards;
      opacity: 0;
    }

    .character-slot img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .form-card {
      position: relative;
      z-index: 3;
      width: min(760px, 100%);
      margin: 20px auto 0;
      padding: 18px 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(12px) saturate(160%);
      background: rgba(10, 18, 44, 0.65);
      box-shadow:
        0 8px 32px 0 rgba(0, 0, 0, 0.8),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .field {
      margin-bottom: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 7px;
      line-height: 1.5;
    }

    select,
    textarea,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      padding: 14px 14px;
      font-size: 17px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    select:focus,
    textarea:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
      background: rgba(46, 201, 255, 0.05);
      box-shadow: 0 0 15px rgba(46, 201, 255, 0.3);
    }

    textarea:focus,
    input[type="text"]:focus {
      transform: translateY(-1px);
    }

    select option {
      color: #0b1a3a;
      background: #ffffff;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      flex-direction: column;
      gap: 12px;
      flex-wrap: wrap;
    }

    .note {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    .btn-submit {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #57e1ff);
      color: #022236;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 17px;
      padding: 15px 26px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(46, 201, 255, 0.28);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      min-height: 18px;
      font-size: 15px;
      color: var(--accent-2);
    }

    .status.error {
      color: var(--danger);
    }

    @keyframes fade-in-up {
      to {
        opacity: 1;
        transform: var(--end-transform, translateY(0));
      }
    }

    @media (max-width: 860px) {
      .hero {
        padding-bottom: 180px;
      }

      .form-card {
        margin-top: 120px;
      }

      .character-slot {
        width: min(34vw, 160px);
      }

      .character-slot[data-slot="center"] {
        --w: min(58vw, 250px) !important;
        --x: -6% !important;
        --y: 120px !important;
        --start-transform: translateY(12px) !important;
        --end-transform: translateY(0) !important;
        top: auto !important;
        z-index: 4;
        display: block;
      }
    }

    @media (min-width: 861px) {
      .screen {
        width: min(1100px, 95vw);
        margin: 24px auto;
        padding: 24px 16px 48px;
      }

      .hero {
        padding: 28px 20px 36px;
      }

      .form-card {
        margin: 28px auto 0;
        padding: 24px 20px;
      }

      .form-grid {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .field {
        margin-bottom: 14px;
      }

      .actions {
        justify-content: space-between;
        align-items: center;
        flex-direction: row;
      }
    }
  </style>
</head>
<body>
  <div id="bgImageLayer" class="bg-image-layer" aria-hidden="true"></div>
  <main class="screen">
    <div class="glow-line" aria-hidden="true"></div>
    <section class="hero">
      <div id="characterLayer" class="character-layer" aria-hidden="true"></div>
      <div id="characterFrontLayer" class="character-front-layer" aria-hidden="true"></div>

      <div class="hero-head">
        <p class="eyebrow">ANIME DJ COSPLAY EVENT</p>
        <h1>イベント体験アンケート</h1>
        <p class="desc">参加者の皆さまの「好き」を教えていただき、次回のジャパコスをより笑顔溢れる最高のステージにするため。</p>
      </div>

      <form id="surveyForm" class="form-card">
        <div class="form-grid">
          <div class="field" data-aos="fade-up" data-aos-delay="100">
            <label for="participation">参加形態</label>
            <select id="participation" required>
              <option value="">選択してください</option>
              <option>一般参加</option>
              <option>コスプレ参加</option>
              <option>DJ出演</option>
              <option>スタッフ</option>
              <option>その他</option>
            </select>
          </div>

          <div class="field" data-aos="fade-up" data-aos-delay="120">
            <label for="participationOther">参加形態(その他)</label>
            <input id="participationOther" type="text" placeholder="その他を選んだ場合のみ">
          </div>

          <div class="field" data-aos="fade-up" data-aos-delay="140">
            <label for="gender">性別</label>
            <select id="gender" required>
              <option value="">選択してください</option>
              <option>男性</option>
              <option>女性</option>
              <option>回答しない</option>
              <option>その他</option>
            </select>
          </div>

          <div class="field" data-aos="fade-up" data-aos-delay="160">
            <label for="ageGroup">年代</label>
            <select id="ageGroup" required>
              <option value="">選択してください</option>
              <option>10代以下</option>
              <option>20代</option>
              <option>30代</option>
              <option>40代</option>
              <option>50代以上</option>
            </select>
          </div>

          <div class="field" data-aos="fade-up" data-aos-delay="180">
            <label for="overall">満足度(全体)</label>
            <select id="overall" required>
              <option value="">選択してください</option>
              <option>5: とても満足</option>
              <option>4: 満足</option>
              <option>3: 普通</option>
              <option>2: やや不満</option>
              <option>1: 不満</option>
            </select>
          </div>

          <div class="field" data-aos="fade-up" data-aos-delay="200">
            <label for="venue">満足度(会場)</label>
            <select id="venue" required>
              <option value="">選択してください</option>
              <option>5: とても満足</option>
              <option>4: 満足</option>
              <option>3: 普通</option>
              <option>2: やや不満</option>
              <option>1: 不満</option>
            </select>
          </div>

          <div class="field full" data-aos="fade-up" data-aos-delay="220">
            <label for="staff">満足度(スタッフ)</label>
            <select id="staff" required>
              <option value="">選択してください</option>
              <option>5: とても満足</option>
              <option>4: 満足</option>
              <option>3: 普通</option>
              <option>2: やや不満</option>
              <option>1: 不満</option>
            </select>
          </div>

          <div class="field full" data-aos="fade-up" data-aos-delay="240">
            <label for="moment">心が震えた瞬間・出来事・物語・起きたこと</label>
            <textarea id="moment"></textarea>
          </div>

          <div class="field full" data-aos="fade-up" data-aos-delay="260">
            <label for="improvement">改善点</label>
            <textarea id="improvement"></textarea>
          </div>

          <div class="field full" data-aos="fade-up" data-aos-delay="280">
            <label for="nextCondition">次回参加条件</label>
            <textarea id="nextCondition"></textarea>
          </div>

          <div class="field full" data-aos="fade-up" data-aos-delay="300">
            <label for="message">主催者の一人（けんじさん）へのメッセージをお願いします！どんな言葉でも良いです。全部、先輩方の思いを、率直に教えていただきたい。私も私の目的のために、ジャパコスを盛り上げます。</label>
            <textarea id="message"></textarea>
          </div>
        </div>

        <div class="actions">
          <p class="note">* 送信内容は運営改善のために利用します。</p>
          <button id="submitBtn" type="submit" class="btn-submit">アンケートを送信</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNQisITfmPufmL_sPufwVYPBnjVQ-dja4r1XCPiUYZMrBC_ph0B-iiNqSN4xEf_bq4IQ/exec";
    const BACKGROUND_IMAGE_URL = "./images/bg.png";

    const CHARACTER_IMAGES = [
      { slot: "left", url: "./images/chara-left.png", alt: "左キャラクター" },
      { slot: "center", url: "./images/chara-center.png", alt: "中央キャラクター" },
      { slot: "right", url: "./images/chara-right.png", alt: "右キャラクター" }
    ];

    const SIDE_CHARACTER_WIDTH = "220px";
    const RIGHT_CHARACTER_WIDTH = "300px";

    const slotStyles = {
      left: { "--w": SIDE_CHARACTER_WIDTH, "--x": "-22px", "--t": "-16px", "--y": "auto" },
      center: {
        "--w": "340px",
        "--x": "-6%",
        "--y": "-26px",
        "--start-transform": "translateY(12px)",
        "--end-transform": "translateY(0)"
      },
      right: {
        "--w": RIGHT_CHARACTER_WIDTH,
        "--r": "-64px",
        "--t": "50%",
        "--y": "auto",
        "--start-transform": "translateY(calc(-50% + 12px))",
        "--end-transform": "translateY(-50%)"
      }
    };

    function pick(id) {
      return document.getElementById(id);
    }

    function applyBackgroundImage() {
      if (!BACKGROUND_IMAGE_URL) return;
      const bgLayer = pick("bgImageLayer");
      bgLayer.style.backgroundImage = `url("${BACKGROUND_IMAGE_URL}")`;
      bgLayer.classList.add("is-visible");
    }

    function renderCharacterImages() {
      const backLayer = pick("characterLayer");
      const frontLayer = pick("characterFrontLayer");
      const status = pick("status");
      CHARACTER_IMAGES.forEach((item, i) => {
        if (!item.url) return;
        const wrap = document.createElement("div");
        wrap.className = "character-slot";
        wrap.dataset.slot = item.slot;
        wrap.style.animationDelay = `${120 + i * 120}ms`;
        const style = slotStyles[item.slot] || {};
        Object.entries(style).forEach(([key, value]) => {
          wrap.style.setProperty(key, value);
        });
        const img = document.createElement("img");
        img.src = item.url;
        img.alt = item.alt || "";
        img.onerror = () => {
          status.classList.add("error");
          status.textContent = "キャラクター画像の読み込みに失敗しました。画像ファイルの配置を確認してください。";
        };
        wrap.appendChild(img);
        if (item.slot === "center" || item.slot === "right") {
          frontLayer.appendChild(wrap);
        } else {
          backLayer.appendChild(wrap);
        }
      });
    }

    function getPayload() {
      return {
        submittedAt: new Date().toISOString(),
        participation: pick("participation").value,
        participationOther: pick("participationOther").value,
        gender: pick("gender").value,
        ageGroup: pick("ageGroup").value,
        satisfaction: {
          overall: pick("overall").value,
          venue: pick("venue").value,
          staff: pick("staff").value
        },
        freeText: {
          moment: pick("moment").value,
          improvement: pick("improvement").value,
          nextCondition: pick("nextCondition").value,
          message: pick("message").value
        }
      };
    }

    async function submitSurvey(event) {
      event.preventDefault();
      const status = pick("status");
      const button = pick("submitBtn");

      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("PASTE_YOUR")) {
        status.classList.add("error");
        status.textContent = "GAS_WEB_APP_URL を設定してください。";
        return;
      }

      button.disabled = true;
      status.classList.remove("error");
      status.textContent = "送信中...";

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(getPayload())
        });
        status.textContent = "送信ありがとうございました。";
        pick("surveyForm").reset();
      } catch (error) {
        status.classList.add("error");
        status.textContent = "送信に失敗しました。通信環境を確認してください。";
      } finally {
        button.disabled = false;
      }
    }

    applyBackgroundImage();
    renderCharacterImages();

    AOS.init({
      duration: 700,
      once: true,
      easing: "ease-out-cubic"
    });

    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.background = `
        radial-gradient(circle at ${x}% ${y}%, rgba(46, 201, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 20% 15%, #173173 0%, rgba(23, 49, 115, 0) 40%),
        radial-gradient(circle at 80% 20%, #004d6a 0%, rgba(0, 77, 106, 0) 35%),
        repeating-linear-gradient(
          -18deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 2px,
          transparent 2px,
          transparent 18px
        ),
        linear-gradient(145deg, var(--bg-1), var(--bg-2))
      `;
    });

    pick("surveyForm").addEventListener("submit", submitSurvey);
  </script>
</body>
</html>
